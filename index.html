<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  <title>taiwanbestphoto / pages</title>
  <meta name="description" content="Joe 的一頁式公開內容 hub — 思考框架、實用工具、參考速查" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafaf9; --fg: #1c1917; --muted: #78716c; --soft: #a8a29e;
      --card: #ffffff; --bd: #e7e5e4; --bd2: #d6d3d1;
      --accent: #44403c; --accent2: #78716c;
      --tag-bg: #e7e5e4; --tag-fg: #44403c;
      --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0c0a09; --fg: #e7e5e4; --muted: #a8a29e; --soft: #57534e;
        --card: #1c1917; --bd: #292524; --bd2: #44403c;
        --accent: #e7e5e4; --accent2: #d6d3d1;
        --tag-bg: #292524; --tag-fg: #d6d3d1;
        --shadow: 0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI",
            "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    main { max-width: 920px; margin: 0 auto; padding: 56px 24px 80px; }

    header { margin-bottom: 40px; text-align: center; }
    h1 { font-size: 32px; margin: 0 0 10px; letter-spacing: -0.02em; font-weight: 700; }
    p.tag { margin: 0 0 22px; color: var(--muted); font-size: 14px; }
    .pills { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .pill {
      display: inline-block; padding: 5px 11px; border-radius: 999px;
      background: var(--tag-bg); color: var(--tag-fg); font-size: 12.5px;
    }

    .search-row {
      display: flex; gap: 8px; align-items: center;
      margin: 0 auto 32px; max-width: 480px;
    }
    input.search {
      flex: 1; min-width: 0;
      background: var(--card); color: var(--fg);
      border: 1px solid var(--bd2); border-radius: 10px;
      padding: 10px 14px; font-size: 14px; outline: none;
      font-family: inherit;
    }
    input.search:focus { border-color: var(--accent); }

    .group { margin-bottom: 36px; }
    .group-head {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 14px; padding-bottom: 6px;
      border-bottom: 1px solid var(--bd);
      cursor: pointer; user-select: none;
    }
    .group-title {
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.01em;
    }
    .group-count {
      font-size: 12px; color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .group-toggle {
      font-size: 11px; color: var(--muted); margin-left: auto;
    }
    .group.collapsed .grid { display: none; }
    .group.collapsed .group-head { margin-bottom: 0; padding-bottom: 0; border-bottom-color: transparent; }

    .grid {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    @media (min-width: 720px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    a.card {
      display: block; padding: 16px 16px 14px;
      background: var(--card); border: 1px solid var(--bd);
      border-radius: 12px; text-decoration: none; color: inherit;
      box-shadow: var(--shadow);
      transition: border-color .15s, transform .05s;
    }
    a.card:hover { border-color: var(--accent2); }
    a.card:active { transform: scale(.99); }

    .card-head {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 6px;
    }
    .card-icon { font-size: 20px; line-height: 1; flex: 0 0 auto; }
    .card-title {
      flex: 1; min-width: 0;
      font-size: 15.5px; font-weight: 600; line-height: 1.3;
    }
    .card-desc {
      font-size: 13px; color: var(--muted);
      margin: 4px 0 10px; line-height: 1.5;
    }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .card-tags span {
      font-size: 11px; padding: 2px 7px; border-radius: 5px;
      background: var(--tag-bg); color: var(--tag-fg);
    }

    .empty {
      padding: 32px 16px; text-align: center;
      color: var(--muted); font-size: 13.5px;
      border: 1px dashed var(--bd); border-radius: 12px;
    }

    footer {
      margin-top: 56px; padding-top: 20px;
      border-top: 1px solid var(--bd);
      font-size: 12.5px; color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media print {
      .search-row { display: none; }
      a.card { break-inside: avoid; }
      .notes-section { display: none; }
    }

    .notes-section {
      max-width: 720px; margin: 0 auto 28px;
      background: var(--card); border: 1px solid var(--bd);
      border-radius: 12px; padding: 16px;
      box-shadow: var(--shadow);
    }
    .notes-section h2 {
      font-size: 15px; margin: 0 0 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .notes-section textarea {
      width: 100%; min-height: 120px; resize: vertical;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--bd2); border-radius: 8px;
      padding: 10px 12px; font-size: 14px; line-height: 1.6;
      font-family: inherit; outline: none;
    }
    .notes-section textarea:focus { border-color: var(--accent); }
    .notes-bar {
      display: flex; align-items: center; gap: 8px;
      margin-top: 10px; flex-wrap: wrap;
    }
    .notes-bar button {
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--bd2); background: var(--card);
      color: var(--fg); font-size: 13px; cursor: pointer;
      font-family: inherit;
    }
    .notes-bar button:hover { border-color: var(--accent); }
    .notes-bar button.primary {
      background: var(--accent); color: var(--bg);
      border-color: var(--accent);
    }
    .notes-status {
      font-size: 12px; color: var(--muted); margin-left: auto;
    }
    .notes-bar input {
      flex: 1; min-width: 200px;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--bd2); border-radius: 8px;
      padding: 6px 10px; font-size: 12px; outline: none;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <main>
    <div class="notes-section">
      <h2>📝 筆記</h2>
      <textarea id="notes-textarea" placeholder="在這裡記錄任何想法…" disabled></textarea>
      <div class="notes-bar">
        <button class="primary" id="notes-save" onclick="saveNotes()">儲存</button>
        <button onclick="loadNotes()">重新載入</button>
        <input id="notes-token" type="password" placeholder="GitHub Token (ghp_...)" />
        <button onclick="saveConfig()">設定</button>
        <span class="notes-status" id="notes-status"></span>
      </div>
    </div>

    <header>
      <h1>taiwanbestphoto / pages</h1>
      <p class="tag">一頁式內容 hub · 思考 / 工具 / 參考 · last updated <span id="d"></span></p>
      <div class="pills">
        <span class="pill">🪪 公開</span>
        <span class="pill">📂 自包含 HTML</span>
        <span class="pill">✏️ 持續更新</span>
      </div>
      <p style="margin:16px 0 0;font-size:14px;">
        📡 <a href="./tools/cctv.html" style="color:var(--accent);text-decoration:none;font-weight:600;">即時影像 monitoring</a>
        — 常用 CCTV 串流：楊梅交流道、萬華、新店、三峽、萬里，嵌入 HLS 直接觀看
      </p>
    </header>

    <div class="search-row">
      <input id="q" class="search" type="search" placeholder="🔍 搜尋工具名稱、標籤…" aria-label="搜尋" />
    </div>

    <div id="hub"></div>

    <footer>
      Hosted on GitHub Pages · 源碼 <a href="https://github.com/taiwanbestphoto/pages" target="_blank" rel="noopener">github.com/taiwanbestphoto/pages</a>
    </footer>
  </main>

  <script>
    // ===== 工具清單 =====
    // 新增工具：複製下面一個物件，改 title/file/desc/tags/group 即可。
    // group: '思考' | '工具' | '參考'
    // path: 相對於 index.html（用 ./tools/xxx.html）
    const TOOLS = [
      {
        icon: "🧭",
        title: "框架概念速查",
        desc: "23 個思考框架速查：核心步驟、常見陷阱、AI 提示詞；可評分、拖曳排序、寫備註。",
        path: "./tools/frameworks.html",
        group: "思考",
        tags: ["決策","分析","框架","DHTML","AI"]
      },
      {
        icon: "📊",
        title: "台股市值儀表板",
        desc: "台股上市櫃市值分布（含 3 年比較）。台積電占比 27%→44%、前 10 大 42%→61%、AI 題材股崛起 / 傳產股衰退的結構劇變。",
        path: "./tools/taiwan-market-cap.html",
        group: "投資",
        tags: ["台股","市值","大環境","AI","3年比較","DHTML"]
      },
      {
        icon: "🔁",
        title: "新麥換股儀表板",
        desc: "新麥 (1580) 7/15 賣出前的換股決策：60/40 配置、7 檔替代標的（SOP / 風險 / 稅務）、分批出場時程。",
        path: "./tools/sinmai-rotation.html",
        group: "投資",
        tags: ["台股","換股","新麥","1580","60/40","DHTML"]
      },
      {
        icon: "🥯",
        title: "新麥中國子公司上市案",
        desc: "新麥 (1580) 中國子公司上交所主板 IPO 分析：2027H2 定論機率 55–70%、三情境股價帶動、5 個關鍵時間錨點（首輪問詢/上會/批文/掛牌）。",
        path: "./tools/sinmai-ipo-cn.html",
        group: "投資",
        tags: ["台股","新麥","1580","A股IPO","上交所","DHTML"]
      },
      {
        icon: "🎯",
        title: "執行監控儀表板",
        desc: "進場後每天用的實戰工具：SOP、部位損益、距停損距離、60/40 再平衡、自動警示（個股 / 組合停損、目標價）。",
        path: "./tools/execution-monitor.html",
        group: "投資",
        tags: ["台股","執行","SOP","停損","再平衡","警示","DHTML"]
      },
      {
        icon: "🤖",
        title: "Hermes Agent v0.18.0 功能一覽",
        desc: "The Judgment Release 完整功能指南：MoA、Completion Contracts、Background Fan-out、Desktop Projects、Scale-to-Zero Gateway — 包含 Joe 實測心得。",
        path: "./tools/hermes-agent-v018.html",
        group: "工具",
        tags: ["AI","Hermes","v0.18","工具","DHTML"]
      },
      {
        icon: "🏭",
        title: "機房檢測輔助工具",
        desc: "ScheduledPages 功能一覽：定時排程、Telegram 心跳、備忘彈窗、執行程式 — 對應機房每日/每週/不定期檢測的完整應用方案。",
        path: "./tools/ce-alarm.html",
        group: "工具",
        tags: ["機房","檢測","排程","心跳","TG","ScheduledPages","DHTML"]
      },
      {
        icon: "📡",
        title: "即時影像 monitoring",
        desc: "常用 CCTV 即時串流：楊梅交流道、三峽、萬華、新店、萬里，嵌入 HLS 串流直接觀看。",
        path: "./tools/cctv.html",
        group: "監控",
        tags: ["CCTV","即時影像","交通","HLS"]
      },
      // 之後新工具往下加：
      {
        icon: "🔐",
        title: "ISO 27001 內稽 2026 · 三軸分類法",
        desc: "80 題年度內稽:控制類型 / 查核方式 / 風險衝擊三軸分類;158 題題庫速查、22 題高風險優先清單。",
        path: "./tools/iso27001-audit.html",
        group: "稽核",
        tags: ["ISO27001","ISMS","內稽","資安","三軸","DHTML"]
      },
      // { icon: "🔧", title: "...", desc: "...", path: "./tools/xxx.html", group: "工具", tags: [...] },
    ];

    const GROUP_ORDER = [
      { id: "思考", icon: "🧭", label: "思考框架" },
      { id: "監控", icon: "📡", label: "即時監控" },
      { id: "工具", icon: "🔧", label: "實用工具" },
      { id: "參考", icon: "📚", label: "參考速查" },
      { id: "稽核", icon: "🔐", label: "內部稽核" },
      { id: "投資", icon: "📈", label: "投資工具", collapsed: true },
    ];

    // ===== 渲染 =====
    const hub = document.getElementById("hub");
    const escapeHtml = s => String(s).replace(/[&<>"']/g, c =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    function cardHtml(t) {
      const tags = (t.tags || []).map(x => `<span>${escapeHtml(x)}</span>`).join("");
      return `
        <a class="card" href="${escapeHtml(t.path)}">
          <div class="card-head">
            <div class="card-icon">${escapeHtml(t.icon || "•")}</div>
            <div class="card-title">${escapeHtml(t.title)}</div>
          </div>
          <div class="card-desc">${escapeHtml(t.desc)}</div>
          <div class="card-tags">${tags}</div>
        </a>`;
    }

    function matches(tool, q) {
      if (!q) return true;
      const hay = (tool.title + " " + (tool.desc || "") + " " +
                   (tool.tags || []).join(" ") + " " + (tool.group || "")).toLowerCase();
      return q.toLowerCase().split(/\s+/).every(w => hay.includes(w));
    }

    function render() {
      const q = (document.getElementById("q").value || "").trim();
      const html = GROUP_ORDER.map(g => {
        const inGroup = TOOLS.filter(t => t.group === g.id && matches(t, q));
        if (!inGroup.length) return "";
        const cards = inGroup.map(cardHtml).join("");
        const collapsed = g.collapsed ? " collapsed" : "";
        const toggle = g.collapsed ? "▶" : "▼";
        return `
          <section class="group${collapsed}" data-group="${g.id}" aria-labelledby="g-${g.id}">
            <div class="group-head" onclick="toggleGroup('${g.id}')">
              <div class="group-title" id="g-${g.id}">${g.icon} ${escapeHtml(g.label)}</div>
              <div class="group-count">${inGroup.length} 個</div>
              <div class="group-toggle">${toggle}</div>
            </div>
            <div class="grid">${cards}</div>
          </section>`;
      }).join("");

      hub.innerHTML = html || `<div class="empty">🚫 沒有符合的內容</div>`;
    }

    document.getElementById("q").addEventListener("input", render);

    function toggleGroup(id) {
      const section = document.querySelector(`[data-group="${id}"]`);
      if (!section) return;
      section.classList.toggle("collapsed");
      const toggle = section.querySelector(".group-toggle");
      if (toggle) toggle.textContent = section.classList.contains("collapsed") ? "▶" : "▼";
    }

    // Last updated — 用 GitHub Pages 部署時間不可靠，改用 local build date。
    document.getElementById("d").textContent =
      new Date().toISOString().slice(0, 10);

    render();

    // ===== Notes (GitHub Gist backend) =====
    // 步驟：1) 建立 GitHub Token (勾選 gist 權限)
    //       2) 到 github.com/gist 建立一個 private gist
    //       3) 複製 gist URL 最後一段作為 GIST_ID
    const NOTES_GIST_ID = "51c45e1f919c3e64f2b574dbfc94427d";
    const NOTES_FILE = "gistfile1.txt";
    const statusEl = document.getElementById("notes-status");
    const textarea = document.getElementById("notes-textarea");
    const tokenInput = document.getElementById("notes-token");

    function getToken() { return localStorage.getItem("gh_token") || ""; }
    function setToken(t) { localStorage.setItem("gh_token", t); }
    function getGistId() { return NOTES_GIST_ID; }

    // Restore fields
    const saved = getToken();
    if (saved) {
      tokenInput.value = saved;
      textarea.disabled = false;
    }

    function saveConfig() {
      const t = tokenInput.value.trim();
      if (!t) { statusEl.textContent = "請輸入 token"; return; }
      setToken(t);
      textarea.disabled = false;
      statusEl.textContent = "設定完成 ✓";
      loadNotes();
    }

    async function ghFetch(url, opts = {}) {
      const token = getToken();
      if (!token) throw new Error("請先設定 GitHub Token");
      const headers = Object.assign({ "Authorization": "token " + token, "Accept": "application/vnd.github+json" }, opts.headers || {});
      const res = await fetch(url, Object.assign({}, opts, { headers }));
      if (!res.ok) throw new Error("GitHub API " + res.status);
      return res.json();
    }

    async function loadNotes() {
      const gistId = getGistId();
      if (!gistId) { statusEl.textContent = "請先設定 Gist ID"; return; }
      statusEl.textContent = "載入中…";
      try {
        const data = await ghFetch("https://api.github.com/gists/" + gistId);
        const content = data.files[NOTES_FILE]?.content || "";
        textarea.value = content;
        statusEl.textContent = "已載入 ✓";
      } catch (e) {
        statusEl.textContent = "載入失敗：" + e.message;
      }
    }

    async function saveNotes() {
      const gistId = getGistId();
      if (!gistId) { statusEl.textContent = "請先設定 Gist ID"; return; }
      statusEl.textContent = "儲存中…";
      try {
        await ghFetch("https://api.github.com/gists/" + gistId, {
          method: "PATCH",
          body: JSON.stringify({ files: { [NOTES_FILE]: { content: textarea.value } } })
        });
        statusEl.textContent = "已儲存 ✓ " + new Date().toLocaleTimeString();
      } catch (e) {
        statusEl.textContent = "儲存失敗：" + e.message;
      }
    }

    // Auto-load if token exists
    if (getToken()) loadNotes();
  </script>
</body>
</html>
