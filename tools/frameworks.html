<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>框架概念速查 · DHTML</title>
<style>
  :root{
    --bg:#f7f7f5; --bg2:#ffffff; --ink:#1a1a22; --ink2:#4a4a55; --ink3:#8a8a95;
    --bd:#e6e6e0; --bd2:#d6d6cf; --accent:#4f46e5; --accent2:#7c3aed;
    --tag:#eef2ff; --tag-ink:#3730a3; --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
    --radius:14px;
  }
  html[data-theme="dark"]{
    --bg:#0f1115; --bg2:#181b22; --ink:#ececef; --ink2:#bcbcc4; --ink3:#7e7e88;
    --bd:#262932; --bd2:#2f333d; --accent:#818cf8; --accent2:#a78bfa;
    --tag:#1f2230; --tag-ink:#a5b4fc; --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 18px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.55;
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:18px 16px 96px}
  header.top{
    position:sticky; top:0; z-index:50;
    background:color-mix(in srgb,var(--bg) 92%,transparent);
    backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--bd);
    margin:-18px -16px 18px; padding:14px 16px;
  }
  h1.title{
    margin:0 0 10px; font-size:20px; letter-spacing:.5px;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    font-weight:800;
  }
  .sub{font-size:12.5px;color:var(--ink3);margin-bottom:12px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .search{
    flex:1 1 240px; min-width:0;
    background:var(--bg2); color:var(--ink);
    border:1px solid var(--bd2); border-radius:10px;
    padding:10px 12px; font-size:14px; outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
  .btn{
    background:var(--bg2); color:var(--ink);
    border:1px solid var(--bd2); border-radius:10px;
    padding:10px 12px; font-size:13px; cursor:pointer;
    transition:background .15s,border-color .15s,transform .05s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{border-color:var(--accent)}
  .btn:active{transform:scale(.98)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:14px 0 18px}
  .chip{
    background:var(--bg2); color:var(--ink2);
    border:1px solid var(--bd2); border-radius:999px;
    padding:6px 11px; font-size:12.5px; cursor:pointer;
    transition:all .15s; user-select:none;
  }
  .chip.on{background:var(--tag);color:var(--tag-ink);border-color:transparent;font-weight:600}
  .chip:hover{transform:translateY(-1px)}
  .chip .ct{opacity:.6;margin-left:5px;font-size:11px}
  /* ===== Rating widget ===== */
  .rating{
    display:inline-flex; align-items:center; gap:1px;
    font-size:14px; line-height:1; user-select:none;
  }
  .rating .star{
    cursor:pointer; color:var(--bd2);
    transition:color .12s, transform .05s;
    padding:0 1px;
  }
  .rating .star.on{color:#f59e0b}
  .rating .star:hover{transform:scale(1.15)}
  html[data-theme="dark"] .rating .star.on{color:#fbbf24}
  .rating .star[data-disabled="true"]{cursor:not-allowed; opacity:.5}
  .card-head .meta-row{
    display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap;
  }
  /* sort chips visually distinct (smaller, on second row) */
  .chips-sort{margin-top:-8px}
  .chips-sort .chip{
    font-size:11.5px; padding:4px 10px;
  }
  .grid{
    display:grid; gap:12px;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  }
  @media (min-width:780px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media (min-width:1080px){.grid{grid-template-columns:repeat(3,1fr)}}
  .card{
    background:var(--bg2); border:1px solid var(--bd); border-radius:var(--radius);
    padding:14px 14px 12px; box-shadow:var(--shadow);
    transition:border-color .15s, transform .15s;
    display:flex; flex-direction:column; gap:10px;
    cursor:pointer;
  }
  .card:hover{border-color:var(--accent)}
  .card.open{border-color:var(--accent2)}
  .card-head{display:flex;align-items:flex-start;gap:10px}
  .num{
    flex:0 0 32px; height:32px; border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; font-weight:700; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    font-variant-numeric:tabular-nums;
  }
  .name{flex:1;min-width:0}
  .nm-zh{font-size:16px;font-weight:700;line-height:1.25}
  .nm-en{font-size:11.5px;color:var(--ink3);font-style:italic;margin-top:2px}
  .cat{
    display:inline-block; font-size:11px; padding:2px 8px; border-radius:999px;
    background:var(--tag); color:var(--tag-ink); font-weight:600;
    margin-top:4px;
  }
  .copy-btn{
    flex:0 0 auto;
    background:var(--bg); color:var(--ink2);
    border:1px solid var(--bd2); border-radius:8px;
    padding:5px 9px; font-size:11.5px; cursor:pointer;
    display:inline-flex; align-items:center; gap:4px;
    transition:background .15s,border-color .15s,color .15s,transform .05s;
    white-space:nowrap;
  }
  .copy-btn:hover{border-color:var(--accent);color:var(--accent)}
  .copy-btn:active{transform:scale(.97)}
  .copy-btn.copied{
    background:var(--accent); color:#fff; border-color:transparent;
  }
  .prompt-box{margin-top:6px}
  .prompt-box summary{
    cursor:pointer; color:var(--accent); font-size:12.5px;
    list-style:none; user-select:none;
  }
  .prompt-box summary::-webkit-details-marker{display:none}
  .prompt-box summary::before{content:"▸ ";font-size:10px}
  .prompt-box[open] summary::before{content:"▾ "}
  .prompt-text{
    background:var(--bg); color:var(--ink2);
    border:1px solid var(--bd2); border-radius:8px;
    padding:10px 12px; margin:8px 0 0;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:12px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word;
    max-height:360px; overflow:auto;
  }
  .scenario{font-size:13px;color:var(--ink2);line-height:1.5}
  .scenario b{color:var(--ink);font-weight:600}
  /* ===== Drag & drop ===== */
  .card[draggable="true"]{cursor:grab}
  .card[draggable="true"]:active{cursor:grabbing}
  .card.drag-over-left{box-shadow:inset 4px 0 0 var(--accent)}
  .card.drag-over-right{box-shadow:inset -4px 0 0 var(--accent)}
  .card.dragging{opacity:.4; transform:rotate(-1deg)}
  .drag-handle{
    color:var(--ink3); font-size:14px; cursor:grab; user-select:none;
    padding:2px 4px; line-height:1; letter-spacing:1px;
  }
  .drag-handle:hover{color:var(--accent)}
  /* ===== Notes textarea ===== */
  .note-area{
    width:100%; min-height:64px; resize:vertical;
    background:var(--bg); color:var(--ink);
    border:1px solid var(--bd2); border-radius:8px;
    padding:8px 10px; font-size:12.5px; line-height:1.5;
    font-family:inherit;
    transition:border-color .15s, box-shadow .15s;
  }
  .note-area:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 25%,transparent)}
  .note-status{font-size:10.5px; color:var(--ink3); margin-top:3px; min-height:14px}
  .note-status.saved{color:#15803d}
  html[data-theme="dark"] .note-status.saved{color:#4ade80}
  .details{
    display:none; border-top:1px dashed var(--bd2);
    padding-top:10px; margin-top:2px;
    font-size:12.5px; color:var(--ink2);
  }
  .card.open .details{display:block}
  .details h4{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.6px;
    color:var(--ink3); margin:8px 0 4px; font-weight:700;
  }
  .details ol,.details ul{margin:0 0 4px 0;padding-left:18px}
  .details li{margin:2px 0}
  .details .pit{color:#b45309}
  html[data-theme="dark"] .details .pit{color:#fbbf24}
  .empty{
    grid-column:1/-1; text-align:center; padding:40px 20px;
    color:var(--ink3); font-size:14px;
  }
  .footer{margin-top:24px;text-align:center;color:var(--ink3);font-size:11.5px}
  .footer code{background:var(--bg2);padding:1px 6px;border-radius:5px;border:1px solid var(--bd2)}
  details summary{cursor:pointer;color:var(--accent);font-size:12.5px;list-style:none}
  details summary::-webkit-details-marker{display:none}
  details summary::before{content:"▸ ";font-size:10px}
  details[open] summary::before{content:"▾ "}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  @media print{
    header.top{position:static}
    .card{break-inside:avoid}
    .details{display:block!important;border-top:1px solid #ccc}
    .btn,.search{display:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1 class="title">🧭 框架概念速查</h1>
    <div class="sub">點卡片展開步驟、陷阱、AI 提示詞；可評分、拖曳排序、寫備註</div>
    <div class="toolbar">
      <input id="q" class="search" type="search" placeholder="🔍 搜尋框架、場景、關鍵字…  例：第一性 / 風險 / 5 Whys" aria-label="搜尋">
      <button id="expandAll" class="btn" type="button">展開全部</button>
      <button id="collapseAll" class="btn" type="button">收合</button>
      <button id="exportJson" class="btn" type="button" title="匯出排序與備註為 JSON">📥 匯出</button>
      <button id="importJson" class="btn" type="button" title="從 JSON 匯入排序與備註">📂 匯入</button>
      <input id="importFile" type="file" accept="application/json,.json" hidden>
      <button id="theme" class="btn" type="button" aria-label="切換主題">☾ 主題</button>
    </div>
    <div id="chips" class="chips" role="tablist" aria-label="場景分類"></div>
    <div id="sortChips" class="chips chips-sort" role="tablist" aria-label="排序方式"></div>
  </header>

  <div id="grid" class="grid" aria-live="polite"></div>

  <div class="footer">
    <details><summary>關於這張表</summary>
      <p style="text-align:left;max-width:680px;margin:10px auto">
        集結跨領域經典思考框架：<b>決策</b>類幫你選邊站、<b>創造</b>類幫你生成解方、<b>分析</b>類幫你看清結構、<b>執行</b>類幫你落地迭代、<b>風險</b>類幫你預判失敗、<b>學習</b>類幫你更新信念。
        點任一卡片可展開「核心步驟」與「常見陷阱」；支援關鍵字搜尋與分類篩選。
        <br>鍵盤快速鍵：<code>/</code> 聚焦搜尋、<code>t</code> 切換深淺主題、<code>e</code> 展開全部、<code>c</code> 收合。
      </p>
    </details>
    <span id="footer-count">共 20 框架</span> · 自包含 HTML · 可存離線使用
  </div>
</div>

<script>
// ============ 資料 ============
const CATS = ["全部","決策","創造","分析","執行","風險","學習"];
const SORTS = [
  { id: "default", label: "預設順序" },
  { id: "rating",  label: "★ 評價 ↓" },
  { id: "title",   label: "A→Z 標題" },
];
const DATA = [
  {n:1,zh:"第一性原理",en:"First Principles",cat:"分析",
   s:"突破既有框架、拆解到最基本的真理再重建",
   steps:["1. 列出你對問題的所有『已知』假設","2. 逐條挑戰：這是事實還是想當然耳？","3. 拆到不可再分的最小單位（物理、邏輯、數學）","4. 從這些基本單位重新組合解方"],
   pit:["誤把『目前做法』當基本事實","拆得不夠細就重建，會做出新瓶裝舊酒"],
   prompt:`你是運用「第一性原理」思考的分析師。請針對以下情境，徹底拆解並重建解方：

【情境】
{{問題/目標}}

請嚴格依下列步驟執行：
1. 列出我對這個情境的所有「已知」假設（包含業界慣例、目前做法、直覺）。
2. 逐條挑戰每一個假設：這是事實還是「想當然耳」？標示可信度。
3. 把問題拆到不可再分的最小單位（物理限制、邏輯前提、數學等式、第一手數據）。
4. 從這些基本單位重新組合出至少 2 個解方，並說明每個解方相對現況的優勢。

請特別避開：
- 把「目前做法」當作基本事實
- 拆得不夠細就重建（新瓶裝舊酒）

最後請給我一個「最可能顛覆現狀」的方案與它的關鍵風險。`},
  {n:2,zh:"反轉思考",en:"Inversion",cat:"決策",
   s:"想『怎樣會失敗』來避開失敗；或想『想要對立面』反向規劃",
   steps:["1. 寫下你想到的成功路徑","2. 反過來問：怎樣會 100% 失敗？","3. 列出所有失敗變因","4. 把每一個失敗變因的反面變成要做的事"],
   pit:["只想到幾種失敗方式就停下","沒有轉成具體行動，只是『小心一點』"],
   prompt:`你是運用「反轉思考」策略的顧問。請幫我從「失敗」與「反面」兩個方向重新規劃：

【我想達成的目標】
{{目標}}

請嚴格依下列步驟執行：
1. 先寫下 1 條我目前心中的「成功路徑」。
2. 反過來問：怎樣做會 100% 失敗？列出至少 10 種失敗情境。
3. 把每一個失敗情境歸類到「策略/人/執行/外部」四類。
4. 為每一類找出 2-3 個關鍵失敗變因。
5. 把每一個失敗變因的「反面」翻成具體的「要做的事」，並標出負責的時間點。

請特別避開：
- 只想到幾種失敗方式就停下（要逼出至少 10 種）
- 只寫「小心一點」這種抽象口號（必須是可驗證的具體行動）

最後給我一個「反轉後」的行動清單，按優先順序排序。`},
  {n:3,zh:"二階思考",en:"Second-Order Thinking",cat:"決策",
   s:"不只看行動的直接結果（第一階），更推演它引發的後續效應（第二、三階）",
   steps:["1. 寫下這個決策的直接結果","2. 那個結果會讓誰做什麼？（第二階）","3. 再下一步呢？（第三階）","4. 算總和，比對第一階的吸引力"],
   pit:["只看短期第一階甜頭","低估二階負面外部性"],
   prompt:`你是擅長「二階思考」的策略分析師。請對我考慮中的決策，推演到第三階效應：

【我考慮的決策】
{{決策內容}}

請依下列步驟推演：
1. 第一階：這個決策的直接結果是什麼？（短期、可見、立刻發生）
2. 第二階：那個結果會讓誰（利害關係人、競爭者、市場）做什麼反應？
3. 第三階：那些反應又會引發哪些連鎖效應？包含正面與負面外部性。
4. 計算淨效果：把三階的正負效應加總，跟第一階的吸引力比較。

請特別注意：
- 不要只看短期第一階的甜頭
- 不要低估二階負面外部性（環境、法規、品牌、團隊士氣）

最後請給我：「做 vs 不做」兩個選項的二階評分（1-10），並指出哪一個未預期的效應最致命。`},
  {n:4,zh:"奧卡姆剃刀",en:"Occam's Razor",cat:"分析",
   s:"面對多個能解釋現象的假設，優先選最簡單的那個（前提是都能解釋）",
   steps:["1. 列出所有能解釋的假設","2. 確認每個假設都能解釋全部證據","3. 比較假設的假設數量","4. 在解釋力相等下，選假設最少的"],
   pit:["簡單 ≠ 正確。最簡單的可能漏掉關鍵變數","複雜度是必要的時候別硬砍"],
   prompt:`你是運用「奧卡姆剃刀」精簡假設的分析師。請幫我從多個假設中篩出最簡潔且充分的解釋：

【我觀察到的現象】
{{現象/資料}}

請依下列步驟執行：
1. 列出所有能解釋這個現象的假設（至少 4 個，盡量多元）。
2. 對每個假設檢驗：能否解釋「全部」現有證據？標示無法解釋的證據點。
3. 計算每個假設的「獨立假設數量」（ad hoc 假設越少越好）。
4. 在「解釋力相等」的假設中，選出假設最少的。
5. 對被剃掉的假設，說明在什麼情況下它會重新勝出。

請特別注意：
- 簡單 ≠ 正確。如果最簡單的假設漏掉關鍵變數，要誠實指出
- 複雜度是真的必要時，別硬砍

最後請給我：最佳假設 + 一句話理由 + 它能被推翻的條件。`},
  {n:5,zh:"帕累托 80/20",en:"Pareto Principle",cat:"執行",
   s:"找出造成 80% 結果的那 20% 關鍵投入，把資源集中過去",
   steps:["1. 列出你的投入項與對應產出","2. 排序累計貢獻，找出頂部 20%","3. 把時間/金錢/人力集中投入","4. 對底部 80% 設法刪除、外包或自動化"],
   pit:["誤把 80/20 當 100/20，硬要再榨","忽略長尾裡少數致命項"],
   prompt:`你是運用「80/20 帕累托法則」的效率顧問。請幫我找出關鍵少數並重新分配資源：

【我想優化的領域】
{{領域/目標}}

請依下列步驟執行：
1. 列出我目前所有的「投入項」（時間、金額、人力、工具、客戶、任務⋯⋯至少 15 項）。
2. 為每個投入項估算它貢獻了多少「產出」（營收、價值、結果）。可以用主觀評分，但必須標示依據。
3. 由大到小排序，計算累計貢獻，找出頂部 20% 的關鍵投入。
4. 對底部 80% 的投入項逐一建議：刪除、外包、自動化、或降級。
5. 重新分配資源的具體建議（時間 + 金錢 + 人力三軸）。

請特別避開：
- 把 80/20 當 100/20，硬要再榨頂部（會撞邊際遞減）
- 忽略長尾裡少數「致命項」（低頻但高傷害的雷）

最後給我一個「下週可執行」的資源重分配計畫，含預估回收。`},
  {n:6,zh:"艾森豪矩陣",en:"Eisenhower Matrix",cat:"執行",

   steps:["1. 寫下先驗機率 p(H)","2. 估算證據的似然性 p(E|H) 與 p(E|¬H)","3. 用貝氏公式算出後驗","4. 重複：每次新證據都重新更新","5. 記錄最大預測落差以校準"],

   prompt:`你是「貝氏更新」教練，請帶我對一個命題做嚴格的信念更新：

{{命題}}

請依下列步驟執行：
1. 先驗：寫下我目前對 H 的信念強度 p(H)（0-100%），並說明依據。

3. 估算似然性：

   - p(E|H 為假) = 證據出現的機率（若 H 是假的）

// ============ 工具 ============
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
const grid = $("#grid");
const chipsBox = $("#chips");

let activeCat = "全部";
let activeSort = "default";   // "default" | "rating" | "title"
let q = "";

// ============ 持久化狀態（排序 + 備註 + 評價） ============
const STORAGE_KEY = "tt20-state-v1";
const state = {
  order: DATA.map(d => d.n),  // 預設 1..20
  notes: {},                   // { "1": "備註", "5": "備註" }
  ratings: {},                 // { "1": 3, "5": 2, ... }  0-3 顆星
};

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (Array.isArray(obj.order) && obj.order.length === DATA.length) {
      const set = new Set(obj.order);
      const valid = DATA.every(d => set.has(d.n));
      if (valid) state.order = obj.order.slice();
    }
    if (obj.notes && typeof obj.notes === "object") {
      state.notes = obj.notes;
    }
    if (obj.ratings && typeof obj.ratings === "object") {
      // sanitize: each value must be integer 0..3
      const clean = {};
      for (const k of Object.keys(obj.ratings)) {
        const v = Number(obj.ratings[k]);
        if (Number.isInteger(v) && v >= 0 && v <= 3) clean[k] = v;
      }
      state.ratings = clean;
    }
  } catch(_) { /* 忽略錯誤，保留預設 */ }
}
function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(_) { /* quota 或 privacy mode，靜默失敗 */ }
}
loadState();

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function classifyText(item){
  return (item.zh+" "+item.en+" "+item.s+" "+item.steps.join(" ")+" "+item.pit.join(" ")).toLowerCase();
}
function cardHtml(item){
  const nl = item.steps.map(s=>`<li>${escapeHtml(s)}</li>`).join("");
  const pl = item.pit.map(s=>`<li>${escapeHtml(s)}</li>`).join("");
  const hasPrompt = !!item.prompt;
  const savedNote = state.notes[String(item.n)] || "";
  const curRating = state.ratings[String(item.n)] || 0;
  const ratingDisabled = activeSort !== "default";  // 非預設排序時鎖住
  const stars = [1,2,3].map(i =>
    `<span class="star ${i<=curRating?'on':''}" data-rate="${item.n}" data-val="${i}" role="button" tabindex="0" aria-label="${i} 顆星" data-disabled="${ratingDisabled?'true':'false'}">${i<=curRating?'★':'☆'}</span>`
  ).join("");
  const ratingHtml = `<span class="rating" data-rating="${item.n}" title="${ratingDisabled?'目前為自動排序，無法評價（切回預設排序可評）':'點擊評分（再次點擊同顆星 = 取消）'}">${stars}</span>`;
  return `
    <article class="card" data-n="${item.n}" tabindex="0" aria-expanded="false" draggable="${ratingDisabled?'false':'true'}">
      <div class="card-head">
        <div class="num">${item.n.toString().padStart(2,"0")}</div>
        <div class="name">
          <div class="nm-zh">${escapeHtml(item.zh)}</div>
          <div class="nm-en">${escapeHtml(item.en)}</div>
          <div class="meta-row">
            <span class="cat">${escapeHtml(item.cat)}</span>
            ${ratingHtml}
          </div>
        </div>
        <span class="drag-handle" aria-label="拖曳排序" title="${ratingDisabled?'目前為自動排序，無法拖曳':'拖曳重新排序'}">⠿</span>
        ${hasPrompt ? `<button type="button" class="copy-btn" data-copy="${item.n}" aria-label="複製提示詞" title="複製 AI 提示詞到剪貼簿">📋 複製</button>` : ''}
      </div>
      <div class="scenario"><b>場景：</b>${escapeHtml(item.s)}</div>
      <div class="details">
        <h4>核心步驟</h4>
        <ol>${nl}</ol>
        <h4>常見陷阱</h4>
        <ul class="pit">${pl}</ul>
        ${hasPrompt ? `<h4>AI 提示詞</h4><details class="prompt-box"><summary>展開 / 預覽提示詞</summary><pre class="prompt-text">${escapeHtml(item.prompt)}</pre></details>` : ''}
        <h4>📝 我的備註</h4>
        <textarea class="note-area" data-note="${item.n}" placeholder="在這裡寫你的個人筆記 / 應用案例 / 反例⋯" aria-label="框架 ${item.n} 的備註">${escapeHtml(savedNote)}</textarea>
        <div class="note-status" data-note-status="${item.n}"></div>
      </div>
    </article>`;
}

function countByCat(){
  const c = {全部: DATA.length};
  DATA.forEach(d => c[d.cat] = (c[d.cat]||0)+1);
  return c;
}

function renderChips(){
  const counts = countByCat();
  chipsBox.innerHTML = CATS.map(c =>
    `<button class="chip ${c===activeCat?'on':''}" data-cat="${escapeHtml(c)}" role="tab" aria-selected="${c===activeCat}">
      ${escapeHtml(c)}<span class="ct">${counts[c]||0}</span>
    </button>`).join("");
  $$(".chip",chipsBox).forEach(b => b.addEventListener("click",()=>{
    activeCat = b.dataset.cat; renderChips(); render();
  }));
}

function renderSortChips(){
  const sortBox = $("#sortChips");
  if (!sortBox) return;
  sortBox.innerHTML = SORTS.map(s =>
    `<button class="chip ${s.id===activeSort?'on':''}" data-sort="${s.id}" role="tab" aria-selected="${s.id===activeSort}">
      ${escapeHtml(s.label)}
    </button>`
  ).join("");
  $$(".chip",sortBox).forEach(b => b.addEventListener("click",()=>{
    activeSort = b.dataset.sort; renderSortChips(); render();
  }));
}

// 依 activeSort 從 DATA 產出排序後的 n 陣列
function sortedIds(){
  if (activeSort === "rating") {
    // 評價降冪，並列時維持 state.order 的相對次序（穩定排序）
    const ids = state.order.slice();
    ids.sort((a,b) => {
      const ra = state.ratings[String(a)] || 0;
      const rb = state.ratings[String(b)] || 0;
      return rb - ra;
    });
    return ids;
  }
  if (activeSort === "title") {
    const ids = state.order.slice();
    ids.sort((a,b) => {
      const da = DATA.find(d => d.n === a);
      const db = DATA.find(d => d.n === b);
      // 用 zh 名稱排序，中文用 localeCompare
      return (da?.zh || "").localeCompare(db?.zh || "", "zh-Hant");
    });
    return ids;
  }
  return state.order.slice();
}

function matches(item){
  if (activeCat !== "全部" && item.cat !== activeCat) return false;
  if (q && !classifyText(item).includes(q.toLowerCase())) return false;
  return true;
}

function render(){
  // 依 activeSort 排，filter 套篩選
  const ordered = sortedIds().map(n => DATA.find(d => d.n === n)).filter(Boolean);
  const list = ordered.filter(matches);
  if (!list.length){
    grid.innerHTML = `<div class="empty">🚫 沒有符合條件的框架<br><small>試試別的關鍵字或分類</small></div>`;
    return;
  }
  grid.innerHTML = list.map(cardHtml).join("");
  // bind card click (toggle expand) — 排除 button / textarea / drag-handle / .star
  $$(".card",grid).forEach(card => {
    const toggle = () => {
      card.classList.toggle("open");
      card.setAttribute("aria-expanded", card.classList.contains("open"));
    };
    card.addEventListener("click", e => {
      if (e.target.closest("a,button,textarea,.drag-handle,.star")) return;
      toggle();
    });
    card.addEventListener("keydown", e => {
      if (e.target.tagName === "TEXTAREA" || e.target.classList.contains("star")) return;
      if (e.key === "Enter" || e.key === " "){ e.preventDefault(); toggle(); }
    });
  });
  // bind rating stars
  $$(".rating .star",grid).forEach(star => {
    const fire = () => {
      if (star.dataset.disabled === "true") return;
      const n = star.dataset.rate;
      const v = Number(star.dataset.val);
      if (!n || !Number.isInteger(v)) return;
      // 再點同一個值 = 取消（設回 0）
      const cur = state.ratings[n] || 0;
      state.ratings[n] = (cur === v) ? 0 : v;
      saveState();
      render();  // 重排（如果 activeSort === "rating"）+ 重渲染星星
    };
    star.addEventListener("click", e => { e.stopPropagation(); fire(); });
    star.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " "){ e.preventDefault(); e.stopPropagation(); fire(); }
    });
  });
  // bind copy buttons
  $$(".copy-btn",grid).forEach(btn => {
    btn.addEventListener("click", async e => {
      e.stopPropagation();
      const n = btn.getAttribute("data-copy");
      const item = DATA.find(d => String(d.n) === String(n));
      if (!item || !item.prompt) return;
      try {
        await navigator.clipboard.writeText(item.prompt);
        const orig = btn.innerHTML;
        btn.classList.add("copied");
        btn.innerHTML = "✓ 已複製";
        setTimeout(() => {
          btn.classList.remove("copied");
          btn.innerHTML = orig;
        }, 1400);
      } catch (err) {
        // fallback：選取 textarea
        const ta = document.createElement("textarea");
        ta.value = item.prompt;
        ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); btn.innerHTML = "✓ 已複製"; }
        catch(_) { btn.innerHTML = "✗ 失敗"; }
        document.body.removeChild(ta);
        setTimeout(() => { btn.innerHTML = "📋 複製"; }, 1400);
      }
    });
  });
  // bind note textareas (debounced save)
  $$(".note-area",grid).forEach(ta => {
    let timer = null;
    const statusEl = grid.querySelector(`[data-note-status="${ta.dataset.note}"]`);
    ta.addEventListener("input", () => {
      if (statusEl){ statusEl.textContent = "編輯中…"; statusEl.classList.remove("saved"); }
      clearTimeout(timer);
      timer = setTimeout(() => {
        const n = ta.dataset.note;
        const v = ta.value;
        if (v.trim() === "") delete state.notes[n];
        else state.notes[n] = v;
        saveState();
        if (statusEl){
          statusEl.textContent = "✓ 已儲存 " + new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
          statusEl.classList.add("saved");
        }
      }, 400);
    });
  });
  // bind drag & drop on cards
  bindDragDrop();
}

// ============ Drag & Drop 排序 ============
let dragSrcN = null;
function bindDragDrop(){
  $$(".card",grid).forEach(card => {
    card.addEventListener("dragstart", e => {
      dragSrcN = Number(card.dataset.n);
      card.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      // Firefox 需要 setData 才能啟動 drag
      try { e.dataTransfer.setData("text/plain", String(dragSrcN)); } catch(_){}
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      $$(".card",grid).forEach(c => c.classList.remove("drag-over-left","drag-over-right"));
      dragSrcN = null;
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      if (!dragSrcN) return;
      const rect = card.getBoundingClientRect();
      const isLeftHalf = (e.clientX - rect.left) < rect.width / 2;
      $$(".card",grid).forEach(c => c.classList.remove("drag-over-left","drag-over-right"));
      card.classList.add(isLeftHalf ? "drag-over-left" : "drag-over-right");
    });
    card.addEventListener("dragleave", () => {
      card.classList.remove("drag-over-left","drag-over-right");
    });
    card.addEventListener("drop", e => {
      e.preventDefault();
      const srcN = dragSrcN ?? Number(e.dataTransfer.getData("text/plain"));
      const dstN = Number(card.dataset.n);
      if (!srcN || srcN === dstN) return;
      const rect = card.getBoundingClientRect();
      const insertBefore = (e.clientX - rect.left) < rect.width / 2;
      const srcIdx = state.order.indexOf(srcN);
      let dstIdx = state.order.indexOf(dstN);
      if (srcIdx === -1 || dstIdx === -1) return;
      // 移除 src，再依方向插入
      state.order.splice(srcIdx, 1);
      // 重新計算 dstIdx（因為 splice 後 index 變動）
      dstIdx = state.order.indexOf(dstN);
      const insertAt = insertBefore ? dstIdx : dstIdx + 1;
      state.order.splice(insertAt, 0, srcN);
      saveState();
      card.classList.remove("drag-over-left","drag-over-right");
      render();
    });
  });
}

// ============ 全域動作 ============
$("#q").addEventListener("input", e => { q = e.target.value; render(); });
$("#expandAll").addEventListener("click", ()=>{ $$(".card",grid).forEach(c=>{c.classList.add("open"); c.setAttribute("aria-expanded","true")}); });
$("#collapseAll").addEventListener("click", ()=>{ $$(".card",grid).forEach(c=>{c.classList.remove("open"); c.setAttribute("aria-expanded","false")}); });

// ============ JSON 匯出 / 匯入 ============
$("#exportJson").addEventListener("click", () => {
  const payload = {
    version: 2,  // bump: 加入 ratings
    exportedAt: new Date().toISOString(),
    frameworkCount: DATA.length,
    order: state.order,
    notes: state.notes,
    ratings: state.ratings,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  a.href = url;
  a.download = `frameworks-state-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
});
$("#importJson").addEventListener("click", () => $("#importFile").click());
$("#importFile").addEventListener("change", e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const obj = JSON.parse(reader.result);
      // 驗證
      if (!Array.isArray(obj.order) || obj.order.length !== DATA.length) throw new Error("order 欄位不正確");
      const set = new Set(obj.order);
      if (!DATA.every(d => set.has(d.n))) throw new Error("order 包含不存在的框架 ID");
      if (obj.notes && typeof obj.notes !== "object") throw new Error("notes 欄位型別錯誤");
      // 評價欄位驗證
      if (obj.ratings && typeof obj.ratings !== "object") throw new Error("ratings 欄位型別錯誤");
      const ratingCount = obj.ratings ? Object.keys(obj.ratings).length : 0;
      if (!confirm(`匯入 ${obj.order.length} 個排序 + ${Object.keys(obj.notes||{}).length} 個備註 + ${ratingCount} 個評價？\n（將覆蓋目前的狀態）`)) {
        e.target.value = "";
        return;
      }
      state.order = obj.order.slice();
      state.notes = obj.notes || {};
      // sanitize ratings（同 loadState）
      const cleanRatings = {};
      if (obj.ratings) {
        for (const k of Object.keys(obj.ratings)) {
          const v = Number(obj.ratings[k]);
          if (Number.isInteger(v) && v >= 0 && v <= 3) cleanRatings[k] = v;
        }
      }
      state.ratings = cleanRatings;
      saveState();
      render();
      alert("✓ 匯入完成");
    } catch (err) {
      alert("✗ 匯入失敗：" + err.message);
    } finally {
      e.target.value = "";  // 允許重複匯入同檔
    }
  };
  reader.onerror = () => alert("✗ 讀檔失敗");
  reader.readAsText(file);
});

const themeBtn = $("#theme");
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t);
  try{ localStorage.setItem("tt20-theme", t); }catch{}
  themeBtn.textContent = t === "dark" ? "☀ 主題" : "☾ 主體";
}
const savedTheme = (()=>{ try{return localStorage.getItem("tt20-theme")}catch{return null} })();
const initialTheme = savedTheme || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
applyTheme(initialTheme);
themeBtn.addEventListener("click", ()=> applyTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark"));

// 鍵盤快速鍵
document.addEventListener("keydown", e => {
  if (e.target.matches("input,textarea,select")) return;
  if (e.key === "/"){ e.preventDefault(); $("#q").focus(); }
  else if (e.key.toLowerCase() === "t"){ themeBtn.click(); }
  else if (e.key.toLowerCase() === "e"){ $("#expandAll").click(); }
  else if (e.key.toLowerCase() === "c"){ $("#collapseAll").click(); }
});

// 初始化
renderChips();
renderSortChips();
render();
// 動態更新 footer 框架數（避免手改）
const fc = document.getElementById('footer-count');
if (fc) fc.textContent = `共 ${DATA.length} 框架`;
</script>
