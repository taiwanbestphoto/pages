// 產生 SVG 縮圖（漸層 + 簡單幾何 + 編號）
function makeThumb(idx, style) {
  const pal = STYLES[style].palette;
  const c1 = pal[0], c2 = pal[1], c3 = pal[2];
  const shapes = [
    `<circle cx="20%" cy="30%" r="40" fill="${c1}40"/>`,
    `<circle cx="80%" cy="20%" r="30" fill="${c2}50"/>`,
    `<circle cx="70%" cy="80%" r="50" fill="${c3}40"/>`,
    `<rect x="50%" y="40%" width="80" height="80" rx="16" fill="${c1}60" transform="rotate(15 50% 50%)"/>`,
  ];
  return `<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <defs><linearGradient id="g${idx}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/>
    </linearGradient></defs>
    <rect width="400" height="300" fill="url(#g${idx})"/>
    ${shapes.join('')}
    <text x="50%" y="55%" text-anchor="middle" font-size="64" font-weight="700" fill="${c3}cc" font-family="-apple-system, sans-serif">${idx}</text>
  </svg>`;
}

// 產生卡片
function buildCard(c, idx) {
  const url = "https://www.pinterest.com/search/pins/?q=" + encodeURIComponent(c.en);
  return `<a class="card" href="${url}" target="_blank" rel="noopener noreferrer" data-style="${c.s}">
    <div class="thumb-wrap">${makeThumb(idx, c.s)}
      <div class="num">${idx}</div>
      <div class="badge">#${c.s}</div>
    </div>
    <div class="body">
      <h3>${c.n}</h3>
      <div class="en">${c.en}</div>
      <div class="tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="cta">Pinterest 搜尋</div>
    </div>
  </a>`;
}

// 分組 + 渲染
function render(filter='all') {
  const board = document.getElementById('board');
  if (filter === 'all') {
    let html = '';
    for (let s = 1; s <= 12; s++) {
      const cards = CARDS.map((c, i) => ({...c, idx: i+1})).filter(c => c.s === s);
      html += `<section class="style-section" data-style="${s}">
        <div class="style-header">
          <span class="emoji">${STYLES[s].emoji}</span>
          <h2>${STYLES[s].name}</h2>
          <span class="count">${cards.length} 個主題</span>
        </div>
        <div class="grid">${cards.map(c => buildCard(c, c.idx)).join('')}</div>
      </section>`;
    }
    board.innerHTML = html;
  } else {
    const cards = CARDS.map((c, i) => ({...c, idx: i+1})).filter(c => c.s === parseInt(filter));
    const s = parseInt(filter);
    board.innerHTML = `<section class="style-section" data-style="${s}">
      <div class="style-header">
        <span class="emoji">${STYLES[s].emoji}</span>
        <h2>${STYLES[s].name}</h2>
        <span class="count">${cards.length} 個主題</span>
      </div>
      <div class="grid">${cards.map(c => buildCard(c, c.idx)).join('')}</div>
    </section>`;
  }
}

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render(btn.dataset.filter);
    window.scrollTo({top: 0, behavior: 'smooth'});
  });
});

render('all');
</script>
